server {
    listen 80;
    server_name your_domain_or_ip.com;

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Increase maximum upload size for large meeting transcripts
    client_max_body_size 20M;

    # Proxy all traffic to the Node.js production server
    location / {
        proxy_pass http://127.0.0.1:3000; # Change port if your app runs on a different port
        proxy_http_version 1.1;
        
        # Enable websockets (Vite HMR/other connections support)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers to forward real user IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
    }
}
